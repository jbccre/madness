name: Run Men Script

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: men-script
  cancel-in-progress: false
  
permissions:
  contents: write

jobs:
  run-men:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with: 
          ref: main

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          extra-packages: |
            dplyr
            readr
            purrr
            tibble
            tidyr
            httr
            jsonlite
            stringdist
      
      - name: Run men script
        run: |
          Rscript run_men.R

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Men script update $(date)" || echo "No changes"
          git push
