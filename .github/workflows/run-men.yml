name: Run Men Script

on:
  schedule:
    - cron: "*/15 18-23 18-19 3 *"
    - cron: "*/15 12-23 20-23 3 *"
    - cron: "*/15 19-23 27-29 3 *"
    - cron: "*/15 0 28-29 3 *"
    - cron: "*/15 15-20 30 3 *"
    - cron: "*/15 18-23 5 4 *"
    - cron: "*/15 21-23 7 4 *"
  workflow_dispatch:

jobs:
  run-men:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          extra-packages: |
            dplyr
            readr
            purrr
            tibble
            tidyr
            httr
            jsonlite
            stringdist
      
      - name: Run men script
        run: |
          Rscript main/run_men.R

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Men script update $(date)" || echo "No changes"
          git push
